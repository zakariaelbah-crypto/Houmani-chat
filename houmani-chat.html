<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Houmani Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surface:#151820;--surface2:#1c2030;
  --border:rgba(255,255,255,0.07);--accent:#4f8ef7;--accent2:#7c5cf6;
  --green:#22c55e;--red:#ef4444;--text:#e8eaf0;--muted:rgba(232,234,240,0.45);
  --shadow:0 8px 32px rgba(0,0,0,0.45);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Cairo',sans-serif;color:var(--text);}
#landing{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 40% 30%,rgba(79,142,247,0.12) 0%,transparent 60%),
             radial-gradient(ellipse at 70% 70%,rgba(124,92,246,0.1) 0%,transparent 55%),var(--bg);
  padding:24px;animation:fadeIn .5s ease;}
#landing.gone{animation:fadeOut .3s ease forwards;pointer-events:none;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{to{opacity:0;transform:scale(0.97)}}
.brand{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;}
.brand-icon{width:68px;height:68px;border-radius:22px;margin-bottom:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 0 40px rgba(79,142,247,0.4);animation:pulse 3s ease infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(79,142,247,0.35)}50%{box-shadow:0 0 65px rgba(79,142,247,0.6)}}
.brand-name{font-size:30px;font-weight:800;}
.brand-name span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.brand-sub{font-size:13px;color:var(--muted);margin-top:4px;}
.card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;box-shadow:var(--shadow);}
.tabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:20px;gap:3px;}
.tab{flex:1;padding:9px;border:none;background:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;color:var(--muted);transition:all .2s;}
.tab.active{background:var(--surface2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.3);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.field input{width:100%;padding:11px 14px;border-radius:10px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:14px;font-weight:600;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--accent);}
.field input::placeholder{color:rgba(255,255,255,0.2);}
.btn{width:100%;padding:13px;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;transition:all .15s;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 20px rgba(79,142,247,0.35);}
.btn-primary:hover{transform:translateY(-1px);}
.btn-primary:active{transform:scale(0.98);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-wa{width:100%;padding:12px;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;margin-top:10px;background:linear-gradient(135deg,#25d366,#128c3e);color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;box-shadow:0 4px 20px rgba(37,211,102,0.3);}
.btn-wa:hover{transform:translateY(-1px);}
.code-box{background:rgba(79,142,247,0.08);border:1px solid rgba(79,142,247,0.2);border-radius:10px;padding:12px 14px;margin-bottom:14px;}
.code-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.code-val{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--accent);letter-spacing:5px;}
.code-hint{font-size:11px;color:var(--muted);margin-top:3px;}
.lang-btn{position:absolute;top:16px;left:16px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:12px;font-weight:700;color:var(--muted);font-family:inherit;transition:all .2s;}
.lang-btn:hover{border-color:var(--accent);color:var(--text);}
/* APP */
#app{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;background:var(--bg);}
#app.show{display:flex;}
#header{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.hlogo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.hinfo{flex:1;min-width:0;}
.hroom{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hcode{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent);cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
.hcode:hover{text-decoration:underline;}
.hactions{display:flex;gap:8px;flex-shrink:0;}
.ibtn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;color:var(--text);}
.ibtn:hover{background:rgba(79,142,247,0.15);border-color:var(--accent);}
.ibtn.active{background:rgba(79,142,247,0.2);border-color:var(--accent);}
.ibtn.danger:hover{background:rgba(239,68,68,0.15);border-color:var(--red);}
.online-bar{display:flex;align-items:center;gap:6px;padding:6px 16px;background:rgba(34,197,94,0.06);border-bottom:1px solid rgba(34,197,94,0.12);flex-shrink:0;}
.odot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
.otext{font-size:11px;color:var(--green);font-weight:700;flex:1;}
.ocount{font-size:11px;color:var(--muted);}
.share-bar{display:flex;align-items:center;gap:8px;padding:7px 16px;background:rgba(37,211,102,0.07);border-bottom:1px solid rgba(37,211,102,0.13);flex-shrink:0;cursor:pointer;transition:background .2s;}
.share-bar:hover{background:rgba(37,211,102,0.13);}
.sbar-text{font-size:12px;font-weight:600;color:#25d366;flex:1;}
.sbar-code{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:#25d366;background:rgba(37,211,102,0.12);padding:2px 10px;border-radius:8px;letter-spacing:2px;}
#members-bar{display:flex;flex-direction:column;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
#members-bar-header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 4px;gap:8px;}
#members-bar-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
#members-bar-counts{display:flex;gap:10px;font-size:11px;font-weight:700;}
.count-online{color:var(--green);}
.count-offline{color:var(--red);}
#members-bar-list{display:flex;align-items:center;gap:8px;padding:4px 16px 10px;overflow-x:auto;scrollbar-width:none;}
#members-bar-list::-webkit-scrollbar{display:none;}
.mchip{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 6px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0;transition:border-color .2s;}
.mchip.offline{opacity:0.45;filter:grayscale(0.4);}
.mavatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;position:relative;}
.mstatus{width:8px;height:8px;border-radius:50%;border:2px solid var(--surface2);position:absolute;bottom:-1px;right:-1px;}
.mstatus.online{background:var(--green);}
.mstatus.offline{background:var(--red);}
.mself{border-color:rgba(79,142,247,0.4);}
.kbtn{width:16px;height:16px;border-radius:50%;border:none;background:rgba(239,68,68,0.2);color:var(--red);font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.kbtn:hover{background:rgba(239,68,68,0.5);}
#msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:2px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
#msgs::-webkit-scrollbar{width:4px;}
#msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.day-div{text-align:center;font-size:11px;color:var(--muted);margin:12px 0;display:flex;align-items:center;gap:10px;}
.day-div::before,.day-div::after{content:'';flex:1;height:1px;background:var(--border);}
.msg{display:flex;gap:10px;padding:3px 0;animation:msgIn .2s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.mine{flex-direction:row-reverse;}
.mavtr{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;align-self:flex-end;}
.mbody{max-width:75%;display:flex;flex-direction:column;gap:2px;}
.msg.mine .mbody{align-items:flex-end;}
.mmeta{display:flex;align-items:center;gap:6px;padding:0 4px;}
.mname{font-size:11px;font-weight:700;}
.mtime{font-size:10px;color:rgba(255,255,255,0.22);}
.mbubble{padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;position:relative;}
.msg.mine .mbubble{background:linear-gradient(135deg,rgba(79,142,247,0.28),rgba(124,92,246,0.22));border-color:rgba(79,142,247,0.3);border-bottom-right-radius:4px;border-bottom-left-radius:16px;}
.mbubble:hover .rbtn{opacity:1;}
.rbtn{position:absolute;right:-8px;top:-8px;width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;}
.reacts{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;}
.rbadge{padding:2px 7px;border-radius:20px;font-size:12px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:3px;}
.rbadge .rc{font-size:10px;font-weight:700;color:var(--muted);}
.sysmsg{text-align:center;font-size:12px;color:var(--muted);padding:5px 14px;margin:6px auto;background:rgba(255,255,255,0.03);border-radius:20px;border:1px solid var(--border);max-width:300px;}
.epicker{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;z-index:30;box-shadow:var(--shadow);animation:popIn .15s ease;}
@keyframes popIn{from{opacity:0;transform:scale(0.9) translateY(6px)}to{opacity:1;transform:scale(1)}}
.epicker span{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;border-radius:8px;transition:background .1s;}
.epicker span:hover{background:var(--surface2);}
#input-area{padding:10px 14px 14px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;}
.irow{display:flex;gap:8px;align-items:flex-end;}
.iwrap{flex:1;display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:8px 12px;transition:border-color .2s;}
.iwrap:focus-within{border-color:rgba(79,142,247,0.5);}
#msgInput{flex:1;background:none;border:none;outline:none;resize:none;font-family:inherit;font-size:14px;color:var(--text);line-height:1.4;max-height:100px;overflow-y:auto;min-height:22px;}
#msgInput::placeholder{color:rgba(255,255,255,0.2);}
.etrig{font-size:18px;cursor:pointer;opacity:0.5;transition:opacity .15s;flex-shrink:0;position:relative;}
.etrig:hover{opacity:1;}
.sbtn{width:42px;height:42px;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.sbtn:hover{transform:scale(1.06);}
.sbtn:active{transform:scale(0.95);}
#typing{font-size:12px;color:var(--muted);padding:0 4px 5px;min-height:18px;font-style:italic;}
.dots{display:inline-flex;gap:3px;align-items:center;margin-right:4px;}
.dots span{width:4px;height:4px;border-radius:50%;background:var(--muted);animation:db 1.2s ease infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes db{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
#callOv{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.92);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px;}
#callOv.show{display:flex;}
.vgrid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:700px;width:100%;}
.vtile{position:relative;border-radius:16px;overflow:hidden;background:#111;border:2px solid var(--border);flex:1;min-width:140px;max-width:320px;aspect-ratio:4/3;}
.vtile video{width:100%;height:100%;object-fit:cover;display:block;}
.vlabel{position:absolute;bottom:8px;left:8px;font-size:11px;font-weight:700;background:rgba(0,0,0,0.6);padding:3px 8px;border-radius:8px;}
.ccontrols{display:flex;gap:12px;}
.cbtn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--surface2);}
.cbtn.on{background:rgba(239,68,68,0.25);border:2px solid var(--red);}
.cbtn.end{background:var(--red);color:#fff;}
.cbtn:hover{transform:scale(1.1);}
.cstatus{font-size:13px;color:var(--muted);font-weight:600;}
#kickModal{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);padding:24px;}
#kickModal.show{display:flex;}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px 24px;width:100%;max-width:320px;box-shadow:var(--shadow);text-align:center;animation:popIn .2s ease;}
.kcard h3{font-size:18px;font-weight:800;margin-bottom:8px;}
.kcard p{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.kactions{display:flex;gap:10px;}
.bcnl{flex:1;padding:11px;border:1px solid var(--border);border-radius:10px;background:none;color:var(--text);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;}
.bcnl:hover{background:var(--surface2);}
.bkick{flex:1;padding:11px;border:none;border-radius:10px;background:var(--red);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;z-index:500;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="toast"></div>

<div id="landing">
  <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
  <div class="brand">
    <div class="brand-icon">💬</div>
    <div class="brand-name"><span>Houmani</span> Chat</div>
    <div class="brand-sub" id="bsub">غرف خاصة. محادثات حقيقية.</div>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tc" onclick="switchTab('c')">إنشاء غرفة</button>
      <button class="tab" id="tj" onclick="switchTab('j')">الانضمام</button>
    </div>
    <div id="tbc">
      <div class="field"><label id="ln">اسمك</label><input id="cname" placeholder="أدخل اسمك" maxlength="24" autocomplete="off"></div>
      <div class="field"><label id="lr">اسم الغرفة</label><input id="rname" placeholder="مثال: عائلة هوماني..." maxlength="32" autocomplete="off"></div>
      <div class="code-box">
        <div class="code-label" id="lf">🔑 رمز الغرفة الدائم</div>
        <div class="code-val">HOUMANI</div>
        <div class="code-hint" id="lh">شاركه مع عائلتك مرة واحدة فقط</div>
      </div>
      <button class="btn btn-primary" id="cbtn" onclick="createRoom()">إنشاء الغرفة</button>
      <button class="btn-wa" onclick="shareWA()"><span>📲</span><span id="wat">مشاركة عبر واتساب</span></button>
    </div>
    <div id="tbj" style="display:none">
      <div class="field"><label id="ljn">اسمك</label><input id="jname" placeholder="أدخل اسمك" maxlength="24" autocomplete="off"></div>
      <div class="field"><label id="ljc">رمز الغرفة</label>
        <input id="jcode" placeholder="HOUMANI" maxlength="10" style="font-family:'Space Mono',monospace;font-size:18px;letter-spacing:4px;text-transform:uppercase" autocomplete="off">
      </div>
      <button class="btn btn-primary" id="jbtn" onclick="joinRoom()">انضم للغرفة</button>
    </div>
  </div>
</div>

<div id="app">
  <div id="header">
    <div class="hlogo">💬</div>
    <div class="hinfo">
      <div class="hroom" id="hroom">Houmani Chat</div>
      <div class="hcode" onclick="copyCode()"><span id="hcode">HOUMANI</span> <span style="font-size:10px;opacity:0.5">📋</span></div>
    </div>
    <div class="hactions">
      <button class="ibtn" id="callBtn" onclick="toggleCall()">📹</button>
      <button class="ibtn danger" onclick="leaveRoom()">🚪</button>
    </div>
  </div>
  <div class="online-bar">
    <div class="odot"></div>
    <div class="otext" id="otext">الغرفة نشطة دائماً ✅</div>
    <div class="ocount" id="ocount"></div>
  </div>
  <div class="share-bar" onclick="shareWA()">
    <span>📲</span>
    <span class="sbar-text" id="sbtext">شارك رمز الغرفة مع عائلتك</span>
    <span class="sbar-code">HOUMANI</span>
  </div>
  <div id="members-bar">
    <div id="members-bar-header">
      <span id="members-bar-title">الأعضاء</span>
      <div id="members-bar-counts">
        <span class="count-online" id="count-online">🟢 0</span>
        <span class="count-offline" id="count-offline">🔴 0</span>
      </div>
    </div>
    <div id="members-bar-list"></div>
  </div>
  <div id="msgs" onclick="closePickers()">
    <div class="day-div"><span id="todayLbl">اليوم</span></div>
  </div>
  <div id="typing"></div>
  <div id="input-area">
    <div class="irow">
      <div class="iwrap">
        <div class="etrig" onclick="toggleEmoji(event)">😊
          <div class="epicker" id="mainEmoji" style="display:none;bottom:44px;right:-8px;">
            <span onclick="ins('😄')">😄</span><span onclick="ins('😂')">😂</span><span onclick="ins('🥰')">🥰</span>
            <span onclick="ins('😎')">😎</span><span onclick="ins('🤔')">🤔</span><span onclick="ins('😭')">😭</span>
            <span onclick="ins('🔥')">🔥</span><span onclick="ins('💯')">💯</span><span onclick="ins('👏')">👏</span>
            <span onclick="ins('🎉')">🎉</span><span onclick="ins('❤️')">❤️</span><span onclick="ins('💀')">💀</span>
            <span onclick="ins('👍')">👍</span><span onclick="ins('👎')">👎</span><span onclick="ins('🚀')">🚀</span>
          </div>
        </div>
        <textarea id="msgInput" rows="1" placeholder="رسالة..." onkeydown="onKey(event)" oninput="onType()"></textarea>
      </div>
      <button class="sbtn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<div id="callOv">
  <div class="cstatus" id="cstat">جارٍ الاتصال...</div>
  <div class="vgrid" id="vgrid">
    <div class="vtile" id="localTile">
      <video id="localVid" autoplay muted playsinline></video>
      <div class="vlabel" id="localLbl">أنت</div>
    </div>
  </div>
  <div class="ccontrols">
    <button class="cbtn" id="muteBtn" onclick="toggleMute()">🎤</button>
    <button class="cbtn" id="vidBtn" onclick="toggleVid()">📷</button>
    <button class="cbtn end" onclick="endCall()">📵</button>
  </div>
</div>

<div id="kickModal">
  <div class="kcard">
    <div style="font-size:40px;margin-bottom:10px">🚫</div>
    <h3 id="ktitle">إزالة عضو</h3>
    <p>هل تريد إزالة <b id="kname"></b> من الغرفة؟</p>
    <div class="kactions">
      <button class="bcnl" onclick="closeKick()">إلغاء</button>
      <button class="bkick" onclick="doKick()">إزالة</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, remove, onDisconnect, serverTimestamp, off, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB = { apiKey:"AIzaSyAOfntzRTIIuqakSpQTYhwuRE0qE_iaGFs", authDomain:"houmani-chat.firebaseapp.com",
  databaseURL:"https://houmani-chat-default-rtdb.firebaseio.com", projectId:"houmani-chat",
  storageBucket:"houmani-chat.firebasestorage.app", messagingSenderId:"748856248873",
  appId:"1:748856248873:web:78696dac32839715e3aa38" };
const app = initializeApp(FB);
const db  = getDatabase(app);

const CODE   = 'HOUMANI';
const RPATH  = 'rooms/'+CODE;
const COLORS = ['#4f8ef7','#7c5cf6','#22c55e','#f59e0b','#ef4444','#06b6d4','#ec4899','#84cc16','#f97316','#8b5cf6'];
const REACTS = ['👍','❤️','😂','😮','😢','🔥','💯','👏'];

let myName='', myColor='', myId='', isHost=false, lang='ar';
let typTimer=null, msgKeys=new Set(), kickId=null;
let localStream=null, peer=null, calls={}, isMuted=false, isVidOff=false;

const T = {
  ar:{ c:'إنشاء غرفة', j:'الانضمام', ln:'اسمك', lr:'اسم الغرفة', ljn:'اسمك', ljc:'رمز الغرفة',
       lf:'🔑 رمز الغرفة الدائم', lh:'شاركه مع عائلتك مرة واحدة فقط',
       cb:'إنشاء الغرفة', jb:'انضم للغرفة', wat:'مشاركة عبر واتساب',
       sb:'شارك رمز الغرفة مع عائلتك', ot:'الغرفة نشطة دائماً ✅',
       td:'اليوم', ph:'رسالة...',
       wa:(c,u)=>`مرحباً! انضم إلى هوماني شات 💬\n🔑 الرمز: *${c}*\n🔗 الرابط: ${u}`,
       t1:(n)=>`${n} يكتب`, tn:(n)=>`${n} يكتبون`,
       kicked:'تم إزالتك من الغرفة من قِبل المسؤول',
       mem:(n)=>`${n} متصل`, you:'أنت', ktitle:'إزالة عضو',
       creating:'جارٍ الإنشاء...', joining:'جارٍ الانضمام...', noroom:'الغرفة غير موجودة. أنشئها أولاً.',
       calling:'متصل', copied:'✅ تم نسخ الرمز!', kicked2:'تمت إزالته',
  },
  en:{ c:'Create Room', j:'Join Room', ln:'Your Name', lr:'Room Name', ljn:'Your Name', ljc:'Room Code',
       lf:'🔑 Permanent Room Code', lh:'Share with family once — never changes',
       cb:'Create Room', jb:'Join Room', wat:'Share via WhatsApp',
       sb:'Share room code with your family', ot:'Room always online ✅',
       td:'Today', ph:'Message...',
       wa:(c,u)=>`Hello! Join Houmani Chat 💬\n🔑 Code: *${c}*\n🔗 Link: ${u}`,
       t1:(n)=>`${n} is typing`, tn:(n)=>`${n} are typing`,
       kicked:'You were removed from the room by the host.',
       mem:(n)=>`${n} online`, you:'you', ktitle:'Remove Member',
       creating:'Creating...', joining:'Joining...', noroom:'Room not found. Create it first.',
       calling:'In call', copied:'✅ Code copied!', kicked2:'removed',
  }
};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function col(n){ let h=0; for(const c of n) h=(h*31+c.charCodeAt(0))&0xffffffff; return COLORS[Math.abs(h)%COLORS.length]; }
function ini(n){ return n.trim().split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?'; }
function fmt(ts){ return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function esc(t){ const d=document.createElement('div');d.textContent=t;return d.innerHTML; }
function scroll(){ const w=document.getElementById('msgs');w.scrollTop=w.scrollHeight; }

window.toggleLang = ()=>{
  lang=lang==='ar'?'en':'ar';
  document.documentElement.lang=lang;
  document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  document.getElementById('langBtn').textContent=lang==='ar'?'EN':'ع';
  applyLang();
};
function applyLang(){
  const t=T[lang];
  document.getElementById('tc').textContent=t.c;
  document.getElementById('tj').textContent=t.j;
  document.getElementById('ln').textContent=t.ln;
  document.getElementById('lr').textContent=t.lr;
  document.getElementById('ljn').textContent=t.ljn;
  document.getElementById('ljc').textContent=t.ljc;
  document.getElementById('lf').textContent=t.lf;
  document.getElementById('lh').textContent=t.lh;
  document.getElementById('cbtn').textContent=t.cb;
  document.getElementById('jbtn').textContent=t.jb;
  document.getElementById('wat').textContent=t.wat;
  document.getElementById('sbtext').textContent=t.sb;
  document.getElementById('otext').textContent=t.ot;
  document.getElementById('todayLbl').textContent=t.td;
  document.getElementById('msgInput').placeholder=t.ph;
  document.getElementById('ktitle').textContent=t.ktitle;
  const mbt=document.getElementById('members-bar-title');
  if(mbt) mbt.textContent=lang==='ar'?'الأعضاء':'Members';
}
applyLang();

window.switchTab = tab=>{
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(tab==='c'&&i===0)||(tab==='j'&&i===1)));
  document.getElementById('tbc').style.display=tab==='c'?'':'none';
  document.getElementById('tbj').style.display=tab==='j'?'':'none';
};

window.toast = (msg,dur=2500)=>{
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
};

window.shareWA = ()=>{
  window.open('https://wa.me/?text='+encodeURIComponent(T[lang].wa(CODE,location.href)),'_blank');
};

window.copyCode = ()=>{
  navigator.clipboard?.writeText(CODE).then(()=>toast(T[lang].copied));
};

// ── PERMANENT ID from localStorage ───────────────────────────────
function getOrCreatePermanentId(name) {
  const storageKey = 'houmani_member_id';
  let id = localStorage.getItem(storageKey);
  if (!id) {
    id = 'member_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
    localStorage.setItem(storageKey, id);
  }
  return id;
}

function saveMemberInfo(name, color) {
  localStorage.setItem('houmani_name', name);
  localStorage.setItem('houmani_color', color);
}

function loadMemberInfo() {
  return {
    name: localStorage.getItem('houmani_name') || '',
    color: localStorage.getItem('houmani_color') || ''
  };
}

// Pre-fill name if returning member
window.addEventListener('DOMContentLoaded', () => {
  const saved = loadMemberInfo();
  if (saved.name) {
    document.getElementById('cname').value = saved.name;
    document.getElementById('jname').value = saved.name;
  }
});

// ── CREATE ────────────────────────────────────────────────────────
window.createRoom = ()=>{
  const name=document.getElementById('cname').value.trim();
  const room=document.getElementById('rname').value.trim();
  if(!name){toast('⚠️ '+T[lang].ln);return;}
  if(!room){toast('⚠️ '+T[lang].lr);return;}
  myName=name; myColor=col(name); 
  myId=getOrCreatePermanentId(name);
  saveMemberInfo(name, myColor);
  isHost=true;
  document.getElementById('cbtn').disabled=true;
  document.getElementById('cbtn').textContent=T[lang].creating;
  set(ref(db,RPATH+'/meta'),{name:room,host:myId,at:serverTimestamp()});
  // clean up old duplicates for this ID
  remove(ref(db,RPATH+'/allMembers')).then(()=>{
    enterRoom(room);
  });
};

// ── JOIN ──────────────────────────────────────────────────────────
window.joinRoom = ()=>{
  const name=document.getElementById('jname').value.trim();
  const code=(document.getElementById('jcode').value.trim().toUpperCase())||CODE;
  if(!name){toast('⚠️ '+T[lang].ljn);return;}
  if(code!==CODE){toast('❌ '+(lang==='ar'?'رمز خاطئ':'Wrong code'));return;}
  myName=name; myColor=col(name);
  myId=getOrCreatePermanentId(name);
  saveMemberInfo(name, myColor);
  isHost=false;
  document.getElementById('jbtn').disabled=true;
  document.getElementById('jbtn').textContent=T[lang].joining;
  get(ref(db,RPATH+'/meta')).then(snap=>{
    if(!snap.exists()){
      toast('❌ '+T[lang].noroom);
      document.getElementById('jbtn').disabled=false;
      document.getElementById('jbtn').textContent=T[lang].jb;
      return;
    }
    enterRoom(snap.val().name);
  });
};

// ── ENTER ROOM ────────────────────────────────────────────────────
function enterRoom(roomName){
  const presRef=ref(db,RPATH+'/presence/'+myId);
  set(presRef,{name:myName,color:myColor,at:serverTimestamp()});
  onDisconnect(presRef).remove();
  onDisconnect(ref(db,RPATH+'/typing/'+myId)).remove();

  // register in allMembers with permanent ID (overwrites previous entry)
  set(ref(db,RPATH+'/allMembers/'+myId),{name:myName,color:myColor});

  // kicked listener
  onValue(ref(db,RPATH+'/kicks/'+myId),snap=>{
    if(snap.exists()){alert(T[lang].kicked);location.reload();}
  });

  document.getElementById('landing').classList.add('gone');
  setTimeout(()=>document.getElementById('landing').style.display='none',320);
  document.getElementById('app').classList.add('show');
  document.getElementById('hroom').textContent=roomName;
  document.getElementById('msgInput').focus();

  // presence
  onValue(ref(db,RPATH+'/presence'),snap=>{
    const m=snap.val()||{};
    renderMembers(m);
    document.getElementById('ocount').textContent=T[lang].mem(Object.keys(m).length);
  });

  // messages
  onValue(ref(db,RPATH+'/messages'),snap=>{
    const msgs=snap.val()||{};
    Object.entries(msgs).forEach(([k,v])=>{
      if(!msgKeys.has(k)){msgKeys.add(k);renderMsg(v,k);}
      else{ const el=document.querySelector(`[data-key="${k}"]`); if(el) updReacts(el,v.reactions||{}); }
    });
    scroll();
  });

  // typing
  onValue(ref(db,RPATH+'/typing'),snap=>{
    const t=snap.val()||{};
    const names=Object.entries(t).filter(([id,v])=>id!==myId&&v).map(([,v])=>v);
    renderTyping(names);
  });
}

function renderMembers(onlineMembers){
  const list=document.getElementById('members-bar-list');
  list.innerHTML='';

  get(ref(db,RPATH+'/allMembers')).then(snap=>{
    const all=snap.val()||{};
    // merge online into all (update name/color if changed)
    Object.entries(onlineMembers).forEach(([id,info])=>{ all[id]=info; });

    const onlineIds = new Set(Object.keys(onlineMembers));
    let onlineCount=0, offlineCount=0;

    // sort: online first, then offline
    const sorted = Object.entries(all).sort(([aid],[bid])=>{
      const ao=onlineIds.has(aid), bo=onlineIds.has(bid);
      if(ao&&!bo)return -1; if(!ao&&bo)return 1; return 0;
    });

    sorted.forEach(([id,info])=>{
      const isMe=id===myId;
      const isOnline=onlineIds.has(id);
      if(isOnline)onlineCount++; else offlineCount++;

      const chip=document.createElement('div');
      chip.className='mchip'+(isMe?' mself':'')+(isOnline?'':' offline');
      chip.innerHTML=`
        <div class="mavatar" style="background:${info.color}22;color:${info.color}">
          ${ini(info.name)}
          <div class="mstatus ${isOnline?'online':'offline'}"></div>
        </div>
        <span>${esc(info.name)}${isMe?' ('+T[lang].you+')':''}</span>
        ${isHost&&!isMe&&isOnline?`<button class="kbtn" onclick="openKick('${id}','${esc(info.name)}')">✕</button>`:''}
      `;
      list.appendChild(chip);
    });

    document.getElementById('count-online').textContent  = '🟢 '+onlineCount;
    document.getElementById('count-offline').textContent = '🔴 '+offlineCount;
    document.getElementById('ocount').textContent = T[lang].mem(onlineCount);
    document.getElementById('members-bar-title').textContent = lang==='ar'?'الأعضاء':'Members';
  });
}

// ── MESSAGES ──────────────────────────────────────────────────────
window.sendMsg = ()=>{
  const inp=document.getElementById('msgInput');
  const text=inp.value.trim();
  if(!text)return;
  inp.value=''; autoResize(inp);
  set(ref(db,RPATH+'/typing/'+myId),null);
  push(ref(db,RPATH+'/messages'),{author:myName,authorId:myId,color:myColor,text,time:Date.now(),reactions:{}});
};

function renderMsg(msg,key){
  const wrap=document.getElementById('msgs');
  const isMe=msg.authorId===myId;
  const div=document.createElement('div');
  div.className='msg'+(isMe?' mine':'');
  div.dataset.key=key;
  div.innerHTML=`
    <div class="mavtr" style="background:${msg.color}22;color:${msg.color}">${ini(msg.author)}</div>
    <div class="mbody">
      <div class="mmeta">
        ${!isMe?`<span class="mname" style="color:${msg.color}">${esc(msg.author)}</span>`:''}
        <span class="mtime">${fmt(msg.time)}</span>
      </div>
      <div class="mbubble">
        ${esc(msg.text)}
        <div class="rbtn" onclick="openRP(event,'${key}')">😊</div>
      </div>
      <div class="reacts-wrap"></div>
    </div>`;
  wrap.appendChild(div);
  updReacts(div,msg.reactions||{});
}

// ── REACTIONS ─────────────────────────────────────────────────────
window.openRP = (e,key)=>{
  e.stopPropagation(); closePickers();
  const bubble=e.currentTarget.parentElement;
  let p=bubble.querySelector('.rpick');
  if(!p){
    p=document.createElement('div');
    p.className='epicker rpick';
    p.style.cssText='bottom:28px;right:0;position:absolute;';
    REACTS.forEach(em=>{
      const sp=document.createElement('span');sp.textContent=em;
      sp.onclick=ev=>{ev.stopPropagation();set(ref(db,RPATH+'/messages/'+key+'/reactions/'+myId),em);closePickers();};
      p.appendChild(sp);
    });
    bubble.style.position='relative';
    bubble.appendChild(p);
  }
  p.style.display='grid';
};

function updReacts(el,reactions){
  const wrap=el.querySelector('.reacts-wrap');if(!wrap)return;
  const c={};Object.values(reactions).forEach(e=>{c[e]=(c[e]||0)+1;});
  wrap.innerHTML=Object.entries(c).map(([e,n])=>`<span class="rbadge"><span>${e}</span><span class="rc">${n}</span></span>`).join('');
}

window.closePickers = ()=>{
  document.querySelectorAll('.rpick').forEach(p=>p.style.display='none');
  document.getElementById('mainEmoji').style.display='none';
};

window.toggleEmoji = e=>{
  e.stopPropagation();
  const p=document.getElementById('mainEmoji');
  p.style.display=p.style.display==='none'?'grid':'none';
};
window.ins = em=>{
  const i=document.getElementById('msgInput');i.value+=em;i.focus();
  document.getElementById('mainEmoji').style.display='none';
};

// ── TYPING ────────────────────────────────────────────────────────
window.onType = ()=>{
  autoResize(document.getElementById('msgInput'));
  set(ref(db,RPATH+'/typing/'+myId),myName);
  if(typTimer)clearTimeout(typTimer);
  typTimer=setTimeout(()=>set(ref(db,RPATH+'/typing/'+myId),null),3000);
};
function renderTyping(names){
  const el=document.getElementById('typing');
  if(!names.length){el.innerHTML='';return;}
  const t=T[lang];
  const lbl=names.length===1?t.t1(names[0]):t.tn(names.join(', '));
  el.innerHTML=`<span class="dots"><span></span><span></span><span></span></span>${lbl}`;
}
window.onKey = e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} };
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}

// ── KICK ──────────────────────────────────────────────────────────
window.openKick = (id,name)=>{
  kickId=id; document.getElementById('kname').textContent=name;
  document.getElementById('kickModal').classList.add('show');
};
window.closeKick = ()=>{ kickId=null; document.getElementById('kickModal').classList.remove('show'); };
window.doKick = ()=>{
  if(!kickId)return;
  const name=document.getElementById('kname').textContent;
  set(ref(db,RPATH+'/kicks/'+kickId),{by:myId,at:serverTimestamp()});
  remove(ref(db,RPATH+'/presence/'+kickId));
  toast('🚫 '+name+' '+T[lang].kicked2);
  closeKick();
};

// ── LEAVE ─────────────────────────────────────────────────────────
window.leaveRoom = ()=>{
  endCall();
  remove(ref(db,RPATH+'/presence/'+myId));
  set(ref(db,RPATH+'/typing/'+myId),null);
  location.reload();
};

// ── CALL ──────────────────────────────────────────────────────────
window.toggleCall = async ()=>{
  if(document.getElementById('callOv').classList.contains('show')){endCall();return;}
  try{localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});}
  catch(e){try{localStream=await navigator.mediaDevices.getUserMedia({audio:true});}
  catch(e2){toast('❌ '+(lang==='ar'?'تعذّر الوصول للكاميرا':'Camera/mic denied'));return;}}
  document.getElementById('localVid').srcObject=localStream;
  document.getElementById('callOv').classList.add('show');
  document.getElementById('callBtn').classList.add('active');
  document.getElementById('cstat').textContent=T[lang].calling;
};

window.endCall = ()=>{
  Object.values(calls).forEach(c=>c.close());calls={};
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  document.getElementById('localVid').srcObject=null;
  document.getElementById('callOv').classList.remove('show');
  document.getElementById('callBtn').classList.remove('active');
  document.querySelectorAll('.vtile:not(#localTile)').forEach(t=>t.remove());
  isMuted=false;isVidOff=false;
  document.getElementById('muteBtn').classList.remove('on');
  document.getElementById('vidBtn').classList.remove('on');
  document.getElementById('muteBtn').textContent='🎤';
  document.getElementById('vidBtn').textContent='📷';
};
window.toggleMute = ()=>{
  isMuted=!isMuted;
  localStream?.getAudioTracks().forEach(t=>t.enabled=!isMuted);
  document.getElementById('muteBtn').classList.toggle('on',isMuted);
  document.getElementById('muteBtn').textContent=isMuted?'🔇':'🎤';
};
window.toggleVid = ()=>{
  isVidOff=!isVidOff;
  localStream?.getVideoTracks().forEach(t=>t.enabled=!isVidOff);
  document.getElementById('vidBtn').classList.toggle('on',isVidOff);
  document.getElementById('vidBtn').textContent=isVidOff?'🚫':'📷';
};
</script>
</body>
</html>
