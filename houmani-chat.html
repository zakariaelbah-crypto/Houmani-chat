<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Houmani Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surface:#151820;--surface2:#1c2030;
  --border:rgba(255,255,255,0.07);--accent:#4f8ef7;--accent2:#7c5cf6;
  --green:#22c55e;--red:#ef4444;--text:#e8eaf0;--muted:rgba(232,234,240,0.45);
  --radius:14px;--shadow:0 8px 32px rgba(0,0,0,0.45);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Cairo',sans-serif;color:var(--text);}

/* ── LANDING ── */
#landing{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 40% 30%,rgba(79,142,247,0.12) 0%,transparent 60%),
             radial-gradient(ellipse at 70% 70%,rgba(124,92,246,0.1) 0%,transparent 55%),var(--bg);
  padding:24px;animation:fadeIn .5s ease;
}
#landing.gone{animation:fadeOut .3s ease forwards;pointer-events:none;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{to{opacity:0;transform:scale(0.97)}}

.brand{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;}
.brand-icon{
  width:68px;height:68px;border-radius:22px;margin-bottom:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:30px;
  box-shadow:0 0 40px rgba(79,142,247,0.4);animation:pulse 3s ease infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(79,142,247,0.35)}50%{box-shadow:0 0 65px rgba(79,142,247,0.6)}}
.brand-name{font-size:30px;font-weight:800;letter-spacing:-0.5px;}
.brand-name span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.brand-sub{font-size:13px;color:var(--muted);margin-top:4px;}

.card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;box-shadow:var(--shadow);}
.tabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:20px;gap:3px;}
.tab{flex:1;padding:9px;border:none;background:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;color:var(--muted);transition:all .2s;}
.tab.active{background:var(--surface2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.3);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.field input{width:100%;padding:11px 14px;border-radius:10px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:14px;font-weight:600;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--accent);}
.field input::placeholder{color:rgba(255,255,255,0.2);}
.btn{width:100%;padding:13px;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;transition:all .15s;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 20px rgba(79,142,247,0.35);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(79,142,247,0.5);}
.btn-primary:active{transform:scale(0.98);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-whatsapp{width:100%;padding:12px;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;margin-top:10px;background:linear-gradient(135deg,#25d366,#128c3e);color:#fff;box-shadow:0 4px 20px rgba(37,211,102,0.3);display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;}
.btn-whatsapp:hover{transform:translateY(-1px);}

.fixed-code-box{background:rgba(79,142,247,0.08);border:1px solid rgba(79,142,247,0.2);border-radius:10px;padding:12px 14px;margin-bottom:14px;}
.fixed-code-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.fixed-code-value{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--accent);letter-spacing:5px;}
.fixed-code-hint{font-size:11px;color:var(--muted);margin-top:3px;}

.lang-toggle{position:absolute;top:16px;left:16px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:12px;font-weight:700;color:var(--muted);transition:all .2s;font-family:inherit;}
.lang-toggle:hover{border-color:var(--accent);color:var(--text);}

/* ── MAIN APP ── */
#app{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;background:var(--bg);}
#app.show{display:flex;}

#header{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.header-logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.header-info{flex:1;min-width:0;}
.header-room{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.header-code{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent);cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
.header-code:hover{text-decoration:underline;}
.header-actions{display:flex;gap:8px;flex-shrink:0;}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;color:var(--text);}
.icon-btn:hover{background:rgba(79,142,247,0.15);border-color:var(--accent);}
.icon-btn.danger:hover{background:rgba(239,68,68,0.15);border-color:var(--red);}

/* Online indicator */
.online-bar{display:flex;align-items:center;gap:6px;padding:6px 16px;background:rgba(34,197,94,0.06);border-bottom:1px solid rgba(34,197,94,0.12);flex-shrink:0;}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
.online-text{font-size:11px;color:var(--green);font-weight:700;flex:1;}
.online-count{font-size:11px;color:var(--muted);}

/* Share banner */
.share-banner{display:flex;align-items:center;gap:8px;padding:7px 16px;background:rgba(37,211,102,0.07);border-bottom:1px solid rgba(37,211,102,0.13);flex-shrink:0;cursor:pointer;transition:background .2s;}
.share-banner:hover{background:rgba(37,211,102,0.13);}
.share-banner-text{font-size:12px;font-weight:600;color:#25d366;flex:1;}
.share-banner-code{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:#25d366;background:rgba(37,211,102,0.12);padding:2px 10px;border-radius:8px;letter-spacing:2px;}

/* Members bar */
#members-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
#members-bar::-webkit-scrollbar{display:none;}
.member-chip{display:flex;align-items:center;gap:6px;padding:4px 10px 4px 5px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0;}
.member-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.member-status{width:7px;height:7px;border-radius:50%;background:var(--green);}
.member-self{border-color:rgba(79,142,247,0.4);}
.kick-btn{width:16px;height:16px;border-radius:50%;border:none;background:rgba(239,68,68,0.2);color:var(--red);font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.kick-btn:hover{background:rgba(239,68,68,0.5);}

/* Messages */
#messages-wrap{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:2px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
#messages-wrap::-webkit-scrollbar{width:4px;}
#messages-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.msg-day{text-align:center;font-size:11px;color:var(--muted);margin:12px 0;display:flex;align-items:center;gap:10px;}
.msg-day::before,.msg-day::after{content:'';flex:1;height:1px;background:var(--border);}
.msg{display:flex;gap:10px;padding:3px 0;animation:msgIn .2s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.mine{flex-direction:row-reverse;}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;align-self:flex-end;}
.msg-body{max-width:75%;display:flex;flex-direction:column;gap:2px;}
.msg.mine .msg-body{align-items:flex-end;}
.msg-meta{display:flex;align-items:center;gap:6px;padding:0 4px;}
.msg-name{font-size:11px;font-weight:700;}
.msg-time{font-size:10px;color:rgba(255,255,255,0.22);}
.msg-bubble{padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;position:relative;}
.msg.mine .msg-bubble{background:linear-gradient(135deg,rgba(79,142,247,0.28),rgba(124,92,246,0.22));border-color:rgba(79,142,247,0.3);border-bottom-right-radius:4px;border-bottom-left-radius:16px;}
.msg-bubble:hover .react-btn{opacity:1;}
.react-btn{position:absolute;right:-8px;top:-8px;width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;}
.reactions{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;}
.reaction-badge{padding:2px 7px;border-radius:20px;font-size:12px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:3px;}
.reaction-badge .rcount{font-size:10px;font-weight:700;color:var(--muted);}
.sys-msg{text-align:center;font-size:12px;color:var(--muted);padding:5px 14px;margin:6px auto;background:rgba(255,255,255,0.03);border-radius:20px;border:1px solid var(--border);max-width:300px;}

/* Emoji picker */
.emoji-picker{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;z-index:30;box-shadow:var(--shadow);animation:popIn .15s ease;}
@keyframes popIn{from{opacity:0;transform:scale(0.9) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.emoji-picker span{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;border-radius:8px;transition:background .1s;}
.emoji-picker span:hover{background:var(--surface2);}

/* Input */
#input-area{padding:10px 14px 14px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.input-wrap{flex:1;display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:8px 12px;transition:border-color .2s;}
.input-wrap:focus-within{border-color:rgba(79,142,247,0.5);}
#msgInput{flex:1;background:none;border:none;outline:none;resize:none;font-family:inherit;font-size:14px;color:var(--text);line-height:1.4;max-height:100px;overflow-y:auto;min-height:22px;}
#msgInput::placeholder{color:rgba(255,255,255,0.2);}
.emoji-trigger{font-size:18px;cursor:pointer;opacity:0.5;transition:opacity .15s;flex-shrink:0;position:relative;}
.emoji-trigger:hover{opacity:1;}
.send-btn{width:42px;height:42px;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.send-btn:hover{transform:scale(1.06);}
.send-btn:active{transform:scale(0.95);}
#typing-indicator{font-size:12px;color:var(--muted);padding:0 4px 5px;min-height:18px;font-style:italic;}
.dot-bounce{display:inline-flex;gap:3px;align-items:center;margin-right:4px;}
.dot-bounce span{width:4px;height:4px;border-radius:50%;background:var(--muted);animation:dotB 1.2s ease infinite;}
.dot-bounce span:nth-child(2){animation-delay:.2s;}
.dot-bounce span:nth-child(3){animation-delay:.4s;}
@keyframes dotB{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* Call overlay */
#call-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.92);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px;}
#call-overlay.show{display:flex;}
.videos-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:700px;width:100%;}
.video-tile{position:relative;border-radius:16px;overflow:hidden;background:#111;border:2px solid var(--border);flex:1;min-width:140px;max-width:320px;aspect-ratio:4/3;}
.video-tile video{width:100%;height:100%;object-fit:cover;display:block;}
.video-tile-label{position:absolute;bottom:8px;left:8px;font-size:11px;font-weight:700;background:rgba(0,0,0,0.6);padding:3px 8px;border-radius:8px;}
.call-controls{display:flex;gap:12px;}
.call-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--surface2);}
.call-btn.on{background:rgba(239,68,68,0.25);border:2px solid var(--red);}
.call-btn.end{background:var(--red);color:#fff;}
.call-btn:hover{transform:scale(1.1);}
.call-status{font-size:13px;color:var(--muted);font-weight:600;}

/* Kick modal */
#kick-modal{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);padding:24px;}
#kick-modal.show{display:flex;}
.kick-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px 24px;width:100%;max-width:320px;box-shadow:var(--shadow);text-align:center;animation:popIn .2s ease;}
.kick-card h3{font-size:18px;font-weight:800;margin-bottom:8px;}
.kick-card p{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.kick-actions{display:flex;gap:10px;}
.btn-cancel{flex:1;padding:11px;border:1px solid var(--border);border-radius:10px;background:none;color:var(--text);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;}
.btn-cancel:hover{background:var(--surface2);}
.btn-kick-confirm{flex:1;padding:11px;border:none;border-radius:10px;background:var(--red);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}

/* Toast */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;z-index:500;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="toast"></div>

<!-- ══ LANDING ══ -->
<div id="landing">
  <button class="lang-toggle" onclick="toggleLang()" id="langBtn">EN</button>
  <div class="brand">
    <div class="brand-icon">💬</div>
    <div class="brand-name"><span>Houmani</span> Chat</div>
    <div class="brand-sub" id="brandSub">غرف خاصة. محادثات حقيقية.</div>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tabCreate" onclick="switchTab('create')">إنشاء غرفة</button>
      <button class="tab" id="tabJoin" onclick="switchTab('join')">الانضمام</button>
    </div>
    <div id="tab-create">
      <div class="field"><label id="lbl-name">اسمك</label><input type="text" id="createName" placeholder="أدخل اسمك" maxlength="24" autocomplete="off"></div>
      <div class="field"><label id="lbl-room">اسم الغرفة</label><input type="text" id="roomName" placeholder="مثال: عائلة هوماني..." maxlength="32" autocomplete="off"></div>
      <div class="fixed-code-box">
        <div class="fixed-code-label" id="lbl-fixed">🔑 رمز الغرفة الدائم</div>
        <div class="fixed-code-value">HOUMANI</div>
        <div class="fixed-code-hint" id="lbl-hint">شاركه مع عائلتك مرة واحدة فقط</div>
      </div>
      <button class="btn btn-primary" id="createBtn" onclick="createRoom()">إنشاء الغرفة</button>
      <button class="btn btn-whatsapp" onclick="shareWhatsApp()"><span>📲</span><span id="waText">مشاركة عبر واتساب</span></button>
    </div>
    <div id="tab-join" style="display:none">
      <div class="field"><label id="lbl-jname">اسمك</label><input type="text" id="joinName" placeholder="أدخل اسمك" maxlength="24" autocomplete="off"></div>
      <div class="field"><label id="lbl-jcode">رمز الغرفة</label>
        <input type="text" id="joinCode" placeholder="HOUMANI" maxlength="10" style="font-family:'Space Mono',monospace;font-size:18px;letter-spacing:4px;text-transform:uppercase" autocomplete="off">
      </div>
      <button class="btn btn-primary" id="joinBtn" onclick="joinRoom()">انضم للغرفة</button>
    </div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">
  <div id="header">
    <div class="header-logo">💬</div>
    <div class="header-info">
      <div class="header-room" id="headerRoom">Houmani Chat</div>
      <div class="header-code" onclick="copyCode()"><span id="codeSpan">HOUMANI</span> <span style="font-size:10px;opacity:0.5">📋</span></div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="callBtn" onclick="toggleCall()">📹</button>
      <button class="icon-btn danger" onclick="leaveRoom()">🚪</button>
    </div>
  </div>

  <div class="online-bar">
    <div class="online-dot"></div>
    <div class="online-text" id="onlineText">الغرفة نشطة دائماً ✅</div>
    <div class="online-count" id="onlineCount"></div>
  </div>

  <div class="share-banner" onclick="shareWhatsApp()">
    <span>📲</span>
    <span class="share-banner-text" id="shareBannerText">شارك رمز الغرفة مع عائلتك</span>
    <span class="share-banner-code">HOUMANI</span>
  </div>

  <div id="members-bar"></div>

  <div id="messages-wrap" onclick="closeAllPickers()">
    <div class="msg-day"><span id="todayLabel">اليوم</span></div>
  </div>

  <div id="typing-indicator"></div>

  <div id="input-area">
    <div class="input-row">
      <div class="input-wrap">
        <div class="emoji-trigger" onclick="toggleMainEmoji(event)">😊
          <div class="emoji-picker" id="mainEmoji" style="display:none;bottom:44px;right:-8px;">
            <span onclick="insertEmoji('😄')">😄</span><span onclick="insertEmoji('😂')">😂</span>
            <span onclick="insertEmoji('🥰')">🥰</span><span onclick="insertEmoji('😎')">😎</span>
            <span onclick="insertEmoji('🤔')">🤔</span><span onclick="insertEmoji('😭')">😭</span>
            <span onclick="insertEmoji('🔥')">🔥</span><span onclick="insertEmoji('💯')">💯</span>
            <span onclick="insertEmoji('👏')">👏</span><span onclick="insertEmoji('🎉')">🎉</span>
            <span onclick="insertEmoji('❤️')">❤️</span><span onclick="insertEmoji('💀')">💀</span>
            <span onclick="insertEmoji('👍')">👍</span><span onclick="insertEmoji('👎')">👎</span>
            <span onclick="insertEmoji('🚀')">🚀</span>
          </div>
        </div>
        <textarea id="msgInput" rows="1" placeholder="رسالة..." onkeydown="handleKey(event)" oninput="handleTyping()"></textarea>
      </div>
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<!-- ══ CALL OVERLAY ══ -->
<div id="call-overlay">
  <div class="call-status" id="callStatus">جارٍ الاتصال...</div>
  <div class="videos-grid" id="videosGrid">
    <div class="video-tile" id="localTile">
      <video id="localVideo" autoplay muted playsinline></video>
      <div class="video-tile-label" id="localLabel">أنت</div>
    </div>
  </div>
  <div class="call-controls">
    <button class="call-btn" id="muteBtn" onclick="toggleMute()">🎤</button>
    <button class="call-btn" id="videoBtn" onclick="toggleVideo()">📷</button>
    <button class="call-btn end" onclick="endCall()">📵</button>
  </div>
</div>

<!-- ══ KICK MODAL ══ -->
<div id="kick-modal">
  <div class="kick-card">
    <div style="font-size:40px;margin-bottom:10px">🚫</div>
    <h3 id="kickTitle">إزالة عضو</h3>
    <p>هل تريد إزالة <b id="kickName"></b> من الغرفة؟</p>
    <div class="kick-actions">
      <button class="btn-cancel" onclick="closeKick()">إلغاء</button>
      <button class="btn-kick-confirm" onclick="confirmKick()">إزالة</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, remove, onDisconnect, serverTimestamp, off }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import Peer from "https://esm.sh/peerjs@1.5.2";

// ── FIREBASE CONFIG ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAOfntzRTIIuqakSpQTYhwuRE0qE_iaGFs",
  authDomain: "houmani-chat.firebaseapp.com",
  databaseURL: "https://houmani-chat-default-rtdb.firebaseio.com",
  projectId: "houmani-chat",
  storageBucket: "houmani-chat.firebasestorage.app",
  messagingSenderId: "748856248873",
  appId: "1:748856248873:web:78696dac32839715e3aa38"
};
const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);

// ── CONSTANTS ────────────────────────────────────────────────────
const FIXED_CODE = 'HOUMANI';
const ROOM_PATH  = 'rooms/' + FIXED_CODE;
const QUICK_REACTIONS = ['👍','❤️','😂','😮','😢','🔥','💯','👏'];
const AVATAR_COLORS = ['#4f8ef7','#7c5cf6','#22c55e','#f59e0b','#ef4444','#06b6d4','#ec4899','#84cc16','#f97316','#8b5cf6'];

// ── STATE ────────────────────────────────────────────────────────
let myName = '', myColor = '', myId = '', isHost = false;
let lang = 'ar';
let typingTimer = null, typingRenderTimer = null;
let localStream = null, peer = null, calls = {}, peerConns = {};
let isMuted = false, isVideoOff = false;
let kickTargetId = null;
let messageKeys = new Set(); // prevent duplicate renders

// ── HELPERS ──────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function getColor(name) { let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))&0xffffffff; return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length]; }
function getInitials(name) { return name.trim().split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?'; }
function fmtTime(ts) { return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function escHtml(t) { const d=document.createElement('div');d.textContent=t;return d.innerHTML; }

// ── LANGUAGE ────────────────────────────────────────────────────
const T = {
  ar:{ create:'إنشاء غرفة', join:'الانضمام', name:'اسمك', room:'اسم الغرفة',
       jname:'اسمك', jcode:'رمز الغرفة', fixed:'🔑 رمز الغرفة الدائم',
       hint:'شاركه مع عائلتك مرة واحدة فقط', createBtn:'إنشاء الغرفة', joinBtn:'انضم للغرفة',
       wa:'مشاركة عبر واتساب', banner:'شارك رمز الغرفة مع عائلتك',
       online:'الغرفة نشطة دائماً ✅', today:'اليوم', msg:'رسالة...',
       waMsg:(c,u)=>`مرحباً! انضم إلى غرفة هوماني شات 💬\n🔑 الرمز: *${c}*\n🔗 الرابط: ${u}`,
       typing1:(n)=>`${n} يكتب`, typingN:(n)=>`${n} يكتبون`,
       kicked:'تم إزالتك من الغرفة من قِبل المسؤول', remove:'إزالة عضو',
       members:(n)=>`${n} عضو متصل`,
  },
  en:{ create:'Create Room', join:'Join Room', name:'Your Name', room:'Room Name',
       jname:'Your Name', jcode:'Room Code', fixed:'🔑 Permanent Room Code',
       hint:'Share with family once — never changes', createBtn:'Create Room', joinBtn:'Join Room',
       wa:'Share via WhatsApp', banner:'Share room code with your family',
       online:'Room always online ✅', today:'Today', msg:'Message...',
       waMsg:(c,u)=>`Hello! Join Houmani Chat 💬\n🔑 Code: *${c}*\n🔗 Link: ${u}`,
       typing1:(n)=>`${n} is typing`, typingN:(n)=>`${n} are typing`,
       kicked:'You were removed from the room by the host.', remove:'Remove Member',
       members:(n)=>`${n} member(s) online`,
  }
};

window.toggleLang = function() {
  lang = lang==='ar'?'en':'ar';
  document.documentElement.lang = lang;
  document.documentElement.dir  = lang==='ar'?'rtl':'ltr';
  document.getElementById('langBtn').textContent = lang==='ar'?'EN':'ع';
  applyLang();
};

function applyLang() {
  const t = T[lang];
  document.getElementById('tabCreate').textContent    = t.create;
  document.getElementById('tabJoin').textContent      = t.join;
  document.getElementById('lbl-name').textContent     = t.name;
  document.getElementById('lbl-room').textContent     = t.room;
  document.getElementById('lbl-jname').textContent    = t.jname;
  document.getElementById('lbl-jcode').textContent    = t.jcode;
  document.getElementById('lbl-fixed').textContent    = t.fixed;
  document.getElementById('lbl-hint').textContent     = t.hint;
  document.getElementById('createBtn').textContent    = t.createBtn;
  document.getElementById('joinBtn').textContent      = t.joinBtn;
  document.getElementById('waText').textContent       = t.wa;
  document.getElementById('shareBannerText').textContent = t.banner;
  document.getElementById('onlineText').textContent   = t.online;
  document.getElementById('todayLabel').textContent   = t.today;
  document.getElementById('msgInput').placeholder     = t.msg;
  document.getElementById('kickTitle').textContent    = t.remove;
}
applyLang();

// ── TABS ────────────────────────────────────────────────────────
window.switchTab = function(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(tab==='create'&&i===0)||(tab==='join'&&i===1)));
  document.getElementById('tab-create').style.display = tab==='create'?'':'none';
  document.getElementById('tab-join').style.display   = tab==='join'  ?'':'none';
};

// ── TOAST ───────────────────────────────────────────────────────
window.toast = function(msg, dur=2500) {
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
};

// ── WHATSAPP ────────────────────────────────────────────────────
window.shareWhatsApp = function() {
  const url = window.location.href;
  window.open('https://wa.me/?text='+encodeURIComponent(T[lang].waMsg(FIXED_CODE,url)),'_blank');
};

window.copyCode = function() {
  navigator.clipboard?.writeText(FIXED_CODE).then(()=>toast('✅ تم نسخ الرمز!'));
};

// ══ CREATE ROOM ══════════════════════════════════════════════════
window.createRoom = function() {
  const name = document.getElementById('createName').value.trim();
  const room = document.getElementById('roomName').value.trim();
  if (!name) { toast('⚠️ ' + (lang==='ar'?'أدخل اسمك':'Enter your name')); return; }
  if (!room)  { toast('⚠️ ' + (lang==='ar'?'أدخل اسم الغرفة':'Enter room name')); return; }
  myName = name; myColor = getColor(name); myId = uid(); isHost = true;
  document.getElementById('createBtn').disabled = true;
  document.getElementById('createBtn').textContent = lang==='ar'?'جارٍ الإنشاء...':'Creating...';
  // Set room meta
  set(ref(db, ROOM_PATH+'/meta'), { name: room, host: myId, createdAt: serverTimestamp() });
  enterRoom(room);
};

// ══ JOIN ROOM ════════════════════════════════════════════════════
window.joinRoom = function() {
  const name = document.getElementById('joinName').value.trim();
  const code = document.getElementById('joinCode').value.trim().toUpperCase() || FIXED_CODE;
  if (!name) { toast('⚠️ ' + (lang==='ar'?'أدخل اسمك':'Enter your name')); return; }
  if (code !== FIXED_CODE) { toast('❌ ' + (lang==='ar'?'رمز خاطئ':'Wrong code')); return; }
  myName = name; myColor = getColor(name); myId = uid(); isHost = false;
  document.getElementById('joinBtn').disabled = true;
  document.getElementById('joinBtn').textContent = lang==='ar'?'جارٍ الانضمام...':'Joining...';
  // check room exists
  onValue(ref(db, ROOM_PATH+'/meta'), snap => {
    if (!snap.exists()) {
      toast('❌ ' + (lang==='ar'?'الغرفة غير موجودة. أنشئها أولاً':'Room not found. Create it first.'));
      document.getElementById('joinBtn').disabled = false;
      document.getElementById('joinBtn').textContent = T[lang].joinBtn;
      return;
    }
    off(ref(db, ROOM_PATH+'/meta'));
    enterRoom(snap.val().name);
  }, { onlyOnce: true });
};

// ══ ENTER ROOM ═══════════════════════════════════════════════════
function enterRoom(roomName) {
  // Register presence
  const presenceRef = ref(db, ROOM_PATH+'/presence/'+myId);
  set(presenceRef, { name: myName, color: myColor, joinedAt: serverTimestamp() });
  onDisconnect(presenceRef).remove();

  // Listen for kick
  onValue(ref(db, ROOM_PATH+'/kicks/'+myId), snap => {
    if (snap.exists()) { alert(T[lang].kicked); location.reload(); }
  });

  // Open UI
  document.getElementById('landing').classList.add('gone');
  setTimeout(()=>document.getElementById('landing').style.display='none',320);
  document.getElementById('app').classList.add('show');
  document.getElementById('headerRoom').textContent = roomName;
  document.getElementById('codeSpan').textContent = FIXED_CODE;
  document.getElementById('msgInput').focus();

  // Listen to presence
  onValue(ref(db, ROOM_PATH+'/presence'), snap => {
    const members = snap.val() || {};
    renderMembers(members);
    const count = Object.keys(members).length;
    document.getElementById('onlineCount').textContent = T[lang].members(count);
  });

  // Listen to messages
  onValue(ref(db, ROOM_PATH+'/messages'), snap => {
    const msgs = snap.val() || {};
    Object.entries(msgs).forEach(([key, msg]) => {
      if (!messageKeys.has(key)) {
        messageKeys.add(key);
        renderMessage(msg, key);
      } else {
        // update reactions
        const el = document.querySelector(`[data-key="${key}"]`);
        if (el) updateReactionsUI(el, msg.reactions||{});
      }
    });
    scrollBottom();
  });

  // Listen to typing
  onValue(ref(db, ROOM_PATH+'/typing'), snap => {
    const typing = snap.val() || {};
    const names = Object.entries(typing).filter(([id,v])=>id!==myId&&v).map(([,v])=>v);
    renderTyping(names);
  });

  // Init WebRTC peer for calls
  initPeer();
}

// ══ MEMBERS ══════════════════════════════════════════════════════
function renderMembers(members) {
  const bar = document.getElementById('members-bar');
  bar.innerHTML = '';
  Object.entries(members).forEach(([id, info]) => {
    const isMe = id === myId;
    const chip = document.createElement('div');
    chip.className = 'member-chip' + (isMe?' member-self':'');
    chip.innerHTML = `
      <div class="member-avatar" style="background:${info.color}22;color:${info.color}">${getInitials(info.name)}</div>
      <span>${info.name}${isMe?' ('+( lang==='ar'?'أنت':'you')+')':''}</span>
      <div class="member-status"></div>
      ${isHost&&!isMe?`<button class="kick-btn" onclick="openKick('${id}','${info.name}')">✕</button>`:''}
    `;
    bar.appendChild(chip);
  });
}

// ══ MESSAGES ═════════════════════════════════════════════════════
window.sendMessage = function() {
  const inp = document.getElementById('msgInput');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; autoResize(inp);
  // clear typing
  set(ref(db, ROOM_PATH+'/typing/'+myId), null);

  push(ref(db, ROOM_PATH+'/messages'), {
    author: myName, authorId: myId, color: myColor,
    text, time: Date.now(), reactions: {}
  });
};

function renderMessage(msg, key) {
  const wrap = document.getElementById('messages-wrap');
  const isMe = msg.authorId === myId;
  const div = document.createElement('div');
  div.className = 'msg' + (isMe?' mine':'');
  div.dataset.key = key;
  div.innerHTML = `
    <div class="msg-avatar" style="background:${msg.color}22;color:${msg.color}">${getInitials(msg.author)}</div>
    <div class="msg-body">
      <div class="msg-meta">
        ${!isMe?`<span class="msg-name" style="color:${msg.color}">${escHtml(msg.author)}</span>`:''}
        <span class="msg-time">${fmtTime(msg.time)}</span>
      </div>
      <div class="msg-bubble">
        ${escHtml(msg.text)}
        <div class="react-btn" onclick="openReactPicker(event,'${key}')">😊</div>
      </div>
      <div class="reactions-wrap"></div>
    </div>`;
  wrap.appendChild(div);
  updateReactionsUI(div, msg.reactions||{});
}

function scrollBottom() {
  const w = document.getElementById('messages-wrap');
  w.scrollTop = w.scrollHeight;
}

// ── REACTIONS ────────────────────────────────────────────────────
window.openReactPicker = function(e, key) {
  e.stopPropagation(); closeAllPickers();
  const bubble = e.currentTarget.parentElement;
  let picker = bubble.querySelector('.rpicker');
  if (!picker) {
    picker = document.createElement('div');
    picker.className = 'emoji-picker rpicker';
    picker.style.cssText = 'bottom:28px;right:0;position:absolute;';
    QUICK_REACTIONS.forEach(em => {
      const sp = document.createElement('span');
      sp.textContent = em;
      sp.onclick = ev => { ev.stopPropagation(); addReaction(key,em); closeAllPickers(); };
      picker.appendChild(sp);
    });
    bubble.style.position='relative';
    bubble.appendChild(picker);
  }
  picker.style.display='grid';
};

function addReaction(key, emoji) {
  const rRef = ref(db, ROOM_PATH+'/messages/'+key+'/reactions/'+myId);
  set(rRef, emoji);
}

function updateReactionsUI(el, reactions) {
  const wrap = el.querySelector('.reactions-wrap');
  if (!wrap) return;
  // count
  const counts = {};
  Object.values(reactions).forEach(e => { counts[e]=(counts[e]||0)+1; });
  wrap.innerHTML = Object.entries(counts).map(([e,n])=>
    `<span class="reaction-badge"><span>${e}</span><span class="rcount">${n}</span></span>`
  ).join('');
}

window.closeAllPickers = function() {
  document.querySelectorAll('.rpicker').forEach(p=>p.style.display='none');
  document.getElementById('mainEmoji').style.display='none';
};

// ── EMOJI INPUT ──────────────────────────────────────────────────
window.toggleMainEmoji = function(e) {
  e.stopPropagation();
  const p=document.getElementById('mainEmoji');
  p.style.display=p.style.display==='none'?'grid':'none';
};
window.insertEmoji = function(em) {
  const inp=document.getElementById('msgInput'); inp.value+=em; inp.focus();
  document.getElementById('mainEmoji').style.display='none';
};

// ── TYPING ──────────────────────────────────────────────────────
window.handleTyping = function() {
  autoResize(document.getElementById('msgInput'));
  set(ref(db, ROOM_PATH+'/typing/'+myId), myName);
  if (typingTimer) clearTimeout(typingTimer);
  typingTimer = setTimeout(()=>set(ref(db, ROOM_PATH+'/typing/'+myId), null), 3000);
};

function renderTyping(names) {
  const el = document.getElementById('typing-indicator');
  if (!names.length) { el.innerHTML=''; return; }
  const t = T[lang];
  const label = names.length===1 ? t.typing1(names[0]) : t.typingN(names.join(', '));
  el.innerHTML=`<span class="dot-bounce"><span></span><span></span><span></span></span> ${label}`;
}

// ── KEYBOARD ────────────────────────────────────────────────────
window.handleKey = function(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} };
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}

// ── KICK ────────────────────────────────────────────────────────
window.openKick = function(id, name) {
  kickTargetId = id;
  document.getElementById('kickName').textContent = name;
  document.getElementById('kick-modal').classList.add('show');
};
window.closeKick = function() {
  kickTargetId = null;
  document.getElementById('kick-modal').classList.remove('show');
};
window.confirmKick = function() {
  if (!kickTargetId) return;
  // write kick signal — kicked user's listener will detect it
  set(ref(db, ROOM_PATH+'/kicks/'+kickTargetId), { by: myId, at: serverTimestamp() });
  // remove their presence
  remove(ref(db, ROOM_PATH+'/presence/'+kickTargetId));
  toast('🚫 ' + document.getElementById('kickName').textContent + ' ' + (lang==='ar'?'تمت إزالته':'removed'));
  closeKick();
};

// ── LEAVE ────────────────────────────────────────────────────────
window.leaveRoom = function() {
  endCall();
  remove(ref(db, ROOM_PATH+'/presence/'+myId));
  set(ref(db, ROOM_PATH+'/typing/'+myId), null);
  location.reload();
};

// ══ WEBRTC CALLS (PeerJS) ════════════════════════════════════════
function initPeer() {
  peer = new Peer(undefined, {
    host:'0.peerjs.com', port:443, path:'/', secure:true,
    config:{iceServers:[{urls:'stun:stun.l.google.com:19302'}]}
  });
  peer.on('open', peerId => {
    set(ref(db, ROOM_PATH+'/peers/'+myId), peerId);
    onDisconnect(ref(db, ROOM_PATH+'/peers/'+myId)).remove();
  });
  peer.on('call', handleIncomingCall);
}

window.toggleCall = async function() {
  if (document.getElementById('call-overlay').classList.contains('show')) { endCall(); return; }
  try { localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true}); }
  catch(e) {
    try { localStream = await navigator.mediaDevices.getUserMedia({audio:true}); }
    catch(e2) { toast('❌ '+(lang==='ar'?'تعذّر الوصول للكاميرا':'Camera/mic denied')); return; }
  }
  document.getElementById('localVideo').srcObject = localStream;
  document.getElementById('call-overlay').classList.add('show');
  document.getElementById('callBtn').classList.add('active');
  document.getElementById('callStatus').textContent = lang==='ar'?'متصل':'In call';

  // call all peers in room
  onValue(ref(db, ROOM_PATH+'/peers'), snap => {
    const peers = snap.val()||{};
    Object.entries(peers).forEach(([uid, peerId]) => {
      if (uid===myId || calls[peerId]) return;
      const call = peer.call(peerId, localStream);
      calls[peerId] = call;
      call.on('stream', rs => addVideoTile(peerId, rs, uid));
      call.on('close', ()=>{ delete calls[peerId]; removeVideoTile(peerId); });
    });
  }, { onlyOnce: true });
};

function handleIncomingCall(call) {
  const answer = stream => {
    localStream = stream;
    document.getElementById('localVideo').srcObject = stream;
    document.getElementById('call-overlay').classList.add('show');
    document.getElementById('callBtn').classList.add('active');
    call.answer(stream);
    calls[call.peer] = call;
    call.on('stream', rs => addVideoTile(call.peer, rs, ''));
    call.on('close', ()=>{ delete calls[call.peer]; removeVideoTile(call.peer); });
  };
  if (localStream) { answer(localStream); return; }
  navigator.mediaDevices.getUserMedia({video:true,audio:true})
    .catch(()=>navigator.mediaDevices.getUserMedia({audio:true}))
    .then(answer).catch(()=>call.answer());
}

function addVideoTile(peerId, stream, memberId) {
  if (document.getElementById('tile-'+peerId)) return;
  const tile = document.createElement('div');
  tile.className='video-tile'; tile.id='tile-'+peerId;
  tile.innerHTML=`<video autoplay playsinline></video><div class="video-tile-label">${memberId||'👤'}</div>`;
  tile.querySelector('video').srcObject = stream;
  document.getElementById('videosGrid').appendChild(tile);
}
function removeVideoTile(pid) { document.getElementById('tile-'+pid)?.remove(); }

window.endCall = function() {
  Object.values(calls).forEach(c=>c.close()); calls={};
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  document.getElementById('localVideo').srcObject=null;
  document.getElementById('call-overlay').classList.remove('show');
  document.getElementById('callBtn').classList.remove('active');
  document.querySelectorAll('.video-tile:not(#localTile)').forEach(t=>t.remove());
  isMuted=false; isVideoOff=false;
  document.getElementById('muteBtn').classList.remove('on');
  document.getElementById('videoBtn').classList.remove('on');
  document.getElementById('muteBtn').textContent='🎤';
  document.getElementById('videoBtn').textContent='📷';
};

window.toggleMute = function() {
  isMuted=!isMuted;
  localStream?.getAudioTracks().forEach(t=>t.enabled=!isMuted);
  document.getElementById('muteBtn').classList.toggle('on',isMuted);
  document.getElementById('muteBtn').textContent=isMuted?'🔇':'🎤';
};
window.toggleVideo = function() {
  isVideoOff=!isVideoOff;
  localStream?.getVideoTracks().forEach(t=>t.enabled=!isVideoOff);
  document.getElementById('videoBtn').classList.toggle('on',isVideoOff);
  document.getElementById('videoBtn').textContent=isVideoOff?'🚫':'📷';
};
</script>
